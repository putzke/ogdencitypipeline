    }

    var navGen = 0;
    function navigate() {

      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

nt-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"39546bf2-5123-4909-bdec-982ce21ba5bd\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: #E8E0CF; }\n  input[type=range]{ -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer; }\n  input[type=range]::-webkit-slider-runnable-track{ height:6px; border-radius:6px; background:linear-gradient(90deg,#1F6FA5,#8FCBE8); }\n  input[type=range]::-moz-range-track{ height:6px; border-radius:6px; background:linear-gradient(90deg,#1F6FA5,#8FCBE8); }\n  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:26px; height:26px; margin-top:-10px; border-radius:50%; background:#fff; border:3px solid #1F6FA5; box-shadow:0 2px 6px rgba(20,50,70,.3); }\n  input[type=range]::-moz-range-thumb{ width:26px; height:26px; border-radius:50%; background:#fff; border:3px solid #1F6FA5; box-shadow:0 2px 6px rgba(20,50,70,.3); }\n  @keyframes shimmer { 0%{opacity:.9} 50%{opacity:1} 100%{opacity:.9} }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; display:flex; justify-content:center; padding:36px 24px 48px; font-family:'Source Sans 3',sans-serif; color:#22323A;\">\n<div style=\"width:100%; max-width:1180px; background:#FBF7EE; border-radius:18px; box-shadow:0 18px 50px rgba(35,50,58,.16); overflow:hidden;\">\n\n  <!-- HEADER -->\n  <div style=\"padding:34px 40px 26px; background:#FBF7EE; border-bottom:1px solid #E8DFcb;\">\n    <div style=\"display:flex; align-items:center; gap:10px; font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.13em; text-transform:uppercase; color:#9A6A3F;\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#D2693E;display:inline-block;\"><\u002Fspan>\n      Ogden Valley · Huntsville, Utah\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:42px; line-height:1.04; margin:12px 0 0; letter-spacing:-.02em; color:#1B2A31; text-wrap:balance;\">Pineview Reservoir Levels<\u002Fh1>\n    <p style=\"font-size:18px; line-height:1.5; margin:12px 0 0; max-width:740px; color:#4A5A62;\">This winter, Pineview Reservoir will be drawn down just enough so crews can replace an aging water transmission line. Here's how that compares with the levels the reservoir reached historically — measured in feet above sea level.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"display:flex; gap:30px; padding:30px 40px 12px; flex-wrap:wrap;\">\n\n    <!-- MAP -->\n    <div style=\"flex:1 1 560px; min-width:340px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A8B6B; margin-bottom:8px;\">Top-down view · full reservoir footprint · cross-section below shows depth<\u002Fdiv>\n      <div style=\"position:relative; background:#EFE7D4; border-radius:14px; padding:8px; border:1px solid #E2D8C0;\">\n        <svg viewBox=\"0 0 1000 700\" style=\"width:100%; height:auto; display:block;\">\n          <defs>\n            <linearGradient id=\"waterGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#7FC1E6\"><\u002Fstop>\n              <stop offset=\"60%\" stop-color=\"#3E92C6\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#1B5E8C\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <linearGradient id=\"landGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#E7DDC6\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#DCCFB1\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <clipPath id=\"lakeClip\"><path d=\"{{ fullPath }}\"><\u002Fpath><\u002FclipPath>\n          <\u002Fdefs>\n\n          <!-- full-pool basin (exposed lakebed when low) -->\n          <path d=\"{{ fullPath }}\" fill=\"url(#landGrad)\" stroke=\"#C2B186\" stroke-width=\"2.5\"><\u002Fpath>\n          <!-- dry-lakebed hatch hint -->\n          <path d=\"{{ fullPath }}\" fill=\"none\" stroke=\"#CDBE99\" stroke-width=\"1\" stroke-dasharray=\"2 7\" opacity=\"0.7\"><\u002Fpath>\n\n          <!-- active water (clipped to the reservoir outline) -->\n          <path d=\"{{ activePath }}\" clip-path=\"url(#lakeClip)\" fill=\"url(#waterGrad)\" fill-opacity=\"{{ waterOpacity }}\" stroke=\"#16527C\" stroke-width=\"2\" style=\"transition:fill-opacity .45s ease;\"><\u002Fpath>\n\n          <!-- dam at SW outlet -->\n          <path d=\"M 158 562 C 122 580, 88 596, 48 620\" fill=\"none\" stroke=\"#1F6FA5\" stroke-width=\"3\" opacity=\"0.45\" stroke-linecap=\"round\"><\u002Fpath>\n          <rect x=\"128\" y=\"554\" width=\"46\" height=\"13\" rx=\"3\" transform=\"rotate(-30 150 560)\" fill=\"#7C6B4A\" stroke=\"#5C4E33\" stroke-width=\"1.2\"><\u002Frect>\n\n          <!-- labels -->\n          <text x=\"42\" y=\"616\" font-family=\"IBM Plex Mono, monospace\" font-size=\"14\" fill=\"#5C4E33\" text-anchor=\"start\" font-weight=\"500\">Pineview Dam<\u002Ftext>\n          <text x=\"368\" y=\"48\" font-family=\"IBM Plex Mono, monospace\" font-size=\"14\" fill=\"#7C6B4A\" text-anchor=\"middle\">North Fork<\u002Ftext>\n          <text x=\"668\" y=\"48\" font-family=\"IBM Plex Mono, monospace\" font-size=\"14\" fill=\"#7C6B4A\" text-anchor=\"middle\">Middle Fork<\u002Ftext>\n          <text x=\"806\" y=\"672\" font-family=\"IBM Plex Mono, monospace\" font-size=\"14\" fill=\"#7C6B4A\" text-anchor=\"middle\">South Fork inlet<\u002Ftext>\n          <circle cx=\"872\" cy=\"470\" r=\"5\" fill=\"#D2693E\"><\u002Fcircle>\n          <text x=\"884\" y=\"475\" font-family=\"IBM Plex Mono, monospace\" font-size=\"14\" fill=\"#9A6A3F\" text-anchor=\"start\">Huntsville<\u002Ftext>\n\n          <!-- ====== PIPELINE: fixed red line (crossing near Port Marina) ====== -->\n          <path d=\"M 386 400 L 446 345\" fill=\"none\" stroke=\"#D8362F\" stroke-width=\"4.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <g transform=\"translate(498 343) rotate(-16)\">\n            <rect x=\"-40\" y=\"-13\" width=\"80\" height=\"24\" rx=\"5\" fill=\"#FBF7EE\" stroke=\"#E2D8C0\" stroke-width=\"1\"><\u002Frect>\n            <text x=\"0\" y=\"5\" text-anchor=\"middle\" font-family=\"Figtree, sans-serif\" font-weight=\"700\" font-size=\"14\" fill=\"#D8362F\">Pipeline<\u002Ftext>\n          <\u002Fg>\n\n          <!-- ====== BOAT LAUNCHES (fixed) ====== -->\n          <g transform=\"translate(372 311)\">\n            <circle r=\"9\" fill=\"#15577F\" stroke=\"#FBF7EE\" stroke-width=\"2.5\"><\u002Fcircle>\n            <path d=\"M 0 -4.5 L 3.6 3.6 L -2.6 3.6 Z\" fill=\"#FBF7EE\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"358\" y=\"304\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Ogden Pineview<\u002Ftext>\n          <text x=\"358\" y=\"320\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Yacht Club<\u002Ftext>\n\n          <g transform=\"translate(384 382)\">\n            <circle r=\"9\" fill=\"#15577F\" stroke=\"#FBF7EE\" stroke-width=\"2.5\"><\u002Fcircle>\n            <path d=\"M 0 -4.5 L 3.6 3.6 L -2.6 3.6 Z\" fill=\"#FBF7EE\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"370\" y=\"378\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Port<\u002Ftext>\n          <text x=\"370\" y=\"394\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Marina<\u002Ftext>\n\n          <g transform=\"translate(623 455)\">\n            <circle r=\"9\" fill=\"#15577F\" stroke=\"#FBF7EE\" stroke-width=\"2.5\"><\u002Fcircle>\n            <path d=\"M 0 -4.5 L 3.6 3.6 L -2.6 3.6 Z\" fill=\"#FBF7EE\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"623\" y=\"483\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Cemetery Point<\u002Ftext>\n\n          <g transform=\"translate(691 590)\">\n            <circle r=\"9\" fill=\"#15577F\" stroke=\"#FBF7EE\" stroke-width=\"2.5\"><\u002Fcircle>\n            <path d=\"M 0 -4.5 L 3.6 3.6 L -2.6 3.6 Z\" fill=\"#FBF7EE\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"691\" y=\"574\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-style=\"italic\" font-size=\"13\" font-weight=\"500\" fill=\"#14323F\" style=\"paint-order:stroke; stroke:#FBF7EE; stroke-width:3px; stroke-linejoin:round;\">Anderson Cove<\u002Ftext>\n        <\u002Fsvg>\n        <!-- live readout chip -->\n        <div style=\"position:absolute; left:18px; top:18px; background:rgba(251,247,238,.94); border:1px solid #E2D8C0; border-radius:11px; padding:11px 15px; box-shadow:0 4px 14px rgba(35,50,58,.12); min-width:182px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#9A8B6B;\">{{ selName }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:6px; margin-top:3px;\">\n            <span style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:30px; color:#1B2A31; line-height:1;\">{{ selElev }}<\u002Fspan>\n            <span style=\"font-size:14px; color:#6A7A82; font-weight:600;\">ft<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13.5px; color:{{ selPctColor }}; font-weight:600; margin-top:3px;\">{{ selPctText }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ELEVATION RULER -->\n    <div style=\"flex:0 0 250px; min-width:240px; display:flex; flex-direction:column;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A8B6B; margin-bottom:8px;\">Water surface elevation<\u002Fdiv>\n      <div style=\"position:relative; flex:1; min-height:430px; border-left:2px solid #C9BC9E; margin-left:64px;\">\n        <!-- ticks -->\n        <sc-for list=\"{{ ticks }}\" as=\"t\" hint-placeholder-count=\"7\">\n          <div style=\"position:absolute; right:100%; top:{{ t.top }}%; transform:translateY(-50%); display:flex; align-items:center; gap:7px; width:64px; justify-content:flex-end;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:{{ t.fs }}; color:{{ t.color }}; white-space:nowrap;\">{{ t.label }}<\u002Fspan>\n            <span style=\"display:block; width:{{ t.len }}; height:2px; background:#C9BC9E;\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <!-- water fill on ruler -->\n        <div style=\"position:absolute; left:0; right:-12px; bottom:0; top:{{ indicatorTop }}%; background:linear-gradient(180deg,rgba(62,146,198,.20),rgba(27,94,140,.32)); border-top:3px solid #1F6FA5; border-radius:0 0 4px 4px; transition:top .45s cubic-bezier(.4,.5,.2,1);\"><\u002Fdiv>\n        <!-- construction drawdown range band (4,855–4,863 ft) -->\n        <div style=\"position:absolute; left:-7px; right:-12px; top:{{ cband.top }}%; height:{{ cband.h }}%; background:rgba(31,111,165,.15); border-top:2px solid {{ cband.col }}; border-bottom:2px dashed {{ cband.col }}; pointer-events:none;\">\n          <span style=\"position:absolute; right:5px; top:-8px; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:{{ cband.col }}; background:rgba(251,247,238,.85); padding:0 3px; border-radius:3px;\">{{ cband.hi }} ft<\u002Fspan>\n          <span style=\"position:absolute; right:5px; bottom:-8px; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:{{ cband.col }}; background:rgba(251,247,238,.85); padding:0 3px; border-radius:3px;\">{{ cband.lo }} ft<\u002Fspan>\n        <\u002Fdiv>\n        <!-- marker dots -->\n        <sc-for list=\"{{ markers }}\" as=\"m\" hint-placeholder-count=\"6\">\n          <div style=\"position:absolute; left:-7px; top:{{ m.top }}%; transform:translateY(-50%); width:12px; height:12px; border-radius:50%; background:{{ m.color }}; border:2px solid #FBF7EE; box-shadow:0 0 0 1px {{ m.color }};\"><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#A99C7C; margin:10px 0 0 64px;\">feet above sea level<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CROSS SECTION -->\n  <div style=\"padding:6px 40px 0;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A8B6B; margin-bottom:8px;\">Cross-section · water depth, dam to upstream forks<\u002Fdiv>\n    <div style=\"position:relative; background:#EFE7D4; border-radius:14px; padding:8px; border:1px solid #E2D8C0;\">\n      <div style=\"position:relative;\">\n      <svg viewBox=\"0 0 1000 290\" style=\"width:100%; height:auto; display:block;\">\n        <defs>\n          <linearGradient id=\"csWater\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#7FC1E6\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#1B5E8C\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <linearGradient id=\"csLand\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stop-color=\"#E2D6BC\"><\u002Fstop>\n            <stop offset=\"100%\" stop-color=\"#CDBE99\"><\u002Fstop>\n          <\u002FlinearGradient>\n          <clipPath id=\"csClip\"><path d=\"{{ csAbovePath }}\"><\u002Fpath><\u002FclipPath>\n        <\u002Fdefs>\n        <rect x=\"0\" y=\"0\" width=\"1000\" height=\"290\" fill=\"#F4EEDF\"><\u002Frect>\n        <rect x=\"0\" y=\"{{ csWaterY }}\" width=\"1000\" height=\"{{ csWaterH }}\" clip-path=\"url(#csClip)\" fill=\"url(#csWater)\" style=\"transition:y .45s cubic-bezier(.4,.5,.2,1), height .45s cubic-bezier(.4,.5,.2,1);\"><\u002Frect>\n        <rect x=\"0\" y=\"{{ csBandY }}\" width=\"1000\" height=\"{{ csBandH }}\" fill=\"rgba(31,111,165,.13)\"><\u002Frect>\n        <path d=\"{{ csEarthPath }}\" fill=\"url(#csLand)\" stroke=\"#C2B186\" stroke-width=\"2.5\"><\u002Fpath>\n        <line x1=\"0\" y1=\"{{ csFullY }}\" x2=\"1000\" y2=\"{{ csFullY }}\" stroke=\"#1F6FA5\" stroke-width=\"1.4\" stroke-dasharray=\"6 6\" opacity=\"0.55\"><\u002Fline>\n        <text x=\"430\" y=\"{{ csFullLabelY }}\" font-family=\"IBM Plex Mono, monospace\" font-size=\"13\" fill=\"#1F6FA5\" opacity=\"0.9\">Full pool · 4,900 ft<\u002Ftext>\n        <line x1=\"0\" y1=\"{{ csBandY }}\" x2=\"1000\" y2=\"{{ csBandY }}\" stroke=\"#1F6FA5\" stroke-width=\"1.4\" stroke-dasharray=\"6 5\" opacity=\"0.85\"><\u002Fline>\n        <line x1=\"0\" y1=\"{{ csBandBotY }}\" x2=\"1000\" y2=\"{{ csBandBotY }}\" stroke=\"#1F6FA5\" stroke-width=\"1.4\" stroke-dasharray=\"6 5\" opacity=\"0.85\"><\u002Fline>\n        <text x=\"992\" y=\"{{ csBandLabelY }}\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-size=\"13\" fill=\"#1F6FA5\">Projected 2026 · 4,855–4,863 ft<\u002Ftext>\n        <rect x=\"60\" y=\"14\" width=\"36\" height=\"13\" rx=\"2\" fill=\"#8C7A56\"><\u002Frect>\n        <text x=\"78\" y=\"284\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"12.5\" fill=\"#7C6B4A\">Dam<\u002Ftext>\n        <text x=\"980\" y=\"284\" text-anchor=\"end\" font-family=\"IBM Plex Mono, monospace\" font-size=\"12.5\" fill=\"#7C6B4A\">Upstream forks →<\u002Ftext>\n      <\u002Fsvg>\n      <div style=\"position:absolute; right:14px; top:{{ csLabelTopPct }}%; transform:translateY(-50%); background:#FBF7EE; border:1.5px solid #1F6FA5; border-radius:6px; padding:3px 11px; font-family:'Figtree',sans-serif; font-weight:700; font-size:13px; color:#15577F; transition:top .45s cubic-bezier(.4,.5,.2,1); white-space:nowrap; box-shadow:0 2px 6px rgba(20,50,70,.12);\">{{ csLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STEPPER -->\n  <div style=\"padding:18px 40px 6px; display:flex; gap:9px; flex-wrap:wrap;\">\n    <div style=\"flex:0 0 100%; font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:#9A8B6B; margin-bottom:3px;\">Choose a timeframe<\u002Fdiv>\n    <sc-for list=\"{{ levels }}\" as=\"lv\" hint-placeholder-count=\"6\">\n      <button onclick=\"{{ lv.onClick }}\" style=\"{{ lv.btnStyle }}\">\n        <span style=\"display:block; font-weight:700; font-size:14px;\">{{ lv.name }}<\u002Fspan>\n        <span style=\"display:block; font-family:'IBM Plex Mono',monospace; font-size:11.5px; opacity:.8; margin-top:2px;\">{{ lv.tag }}<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- CONTEXT CARDS -->\n  <div style=\"padding:20px 40px 8px; display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n    <div style=\"background:#F3EEDF; border-radius:12px; padding:16px 16px 17px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#9A8B6B;\">Full pool<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:26px; color:#1B2A31; margin-top:5px;\">~4,900 ft<\u002Fdiv>\n      <p style=\"font-size:13.5px; color:#5A6A72; margin:6px 0 0; line-height:1.45;\">110,150 acre-feet of water spread across ~2,874 surface acres.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#F3EEDF; border-radius:12px; padding:16px 16px 17px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#9A8B6B;\">Projected · end of 2026<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:24px; color:#1B2A31; margin-top:5px;\">4,855–4,863 ft<\u002Fdiv>\n      <p style=\"font-size:13.5px; color:#5A6A72; margin:6px 0 0; line-height:1.45;\">Pineview is projected to settle within this range by the end of 2026 on its own — even without the drawdown project.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#FAEDE4; border-radius:12px; padding:16px 16px 17px; border:1px solid #EAC9B6;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#C0683E;\">This winter · construction low<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:26px; color:#B0552F; margin-top:5px;\">4,839 ft<\u002Fdiv>\n      <p style=\"font-size:13.5px; color:#8A5236; margin:6px 0 0; line-height:1.45;\">Drawn down below the normal winter low so crews can reach and replace the transmission line.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#F3EEDF; border-radius:12px; padding:16px 16px 17px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#9A8B6B;\">Record low<\u002Fdiv>\n      <div style=\"font-family:'Figtree',sans-serif; font-weight:800; font-size:26px; color:#1B2A31; margin-top:5px;\">Oct 1970 · 4,829 ft<\u002Fdiv>\n      <p style=\"font-size:13.5px; color:#5A6A72; margin:6px 0 0; line-height:1.45;\">Lowest on record at about 0.2% of capacity — below the Oct 1992 low of 4,835 ft (1.7%).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"padding:18px 40px 30px; margin-top:14px; border-top:1px solid #E8DFcb; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; align-items:flex-end;\">\n    <p style=\"font-size:12px; color:#9A8B6B; margin:0; max-width:700px; line-height:1.5;\">Full pool (~4,900 ft) and total capacity (110,150 acre-feet) are from the U.S. Bureau of Reclamation. The Oct 2021, projected-2026, construction-low, Oct 1992 and Oct 1970 elevations are from the compiled record. Interior water footprints are modeled from the reservoir's capacity curve and are schematic.<\u002Fp>\n    <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#B0A283; text-align:right; line-height:1.6;\">Sources: USBR · USACE · USGS<br>Utah DWR · Snoflo<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:1180},&quot;showCapacity&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#D2693E&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { elev: 4900, selKey: 'full' };\n\n  // stylized Pineview shoreline: [x, y, dryoutThreshold]\n  shore() {\n    // outline traced directly from the satellite image (228 pts), scaled to viewBox\n    return [[388.4,60],[407,68.5],[410.4,75.2],[405.3,82],[407,104],[425.6,112.4],[442.5,105.7],[442.5,124.3],[466.2,134.4],[474.6,144.5],[472.9,156.4],[462.8,168.2],[472.9,191.9],[464.5,208.8],[466.2,224],[457.7,239.2],[466.2,286.6],[435.7,318.7],[439.1,337.3],[451,347.5],[476.3,340.7],[486.5,318.7],[496.6,313.6],[562.6,293.4],[591.3,266.3],[593,256.2],[586.2,244.3],[574.4,254.5],[557.5,251 5,570.7],[567.6,570.7],[562.6,563.9],[544,562.2],[532.1,552.1],[500,547],[491.5,553.8],[488.2,543.6],[474.6,543.6],[472.9,535.2],[452.7,519.9],[393.5,487.8],[334.3,487.8],[308.9,504.7],[295.4,506.4],[263.3,531.8],[221,540.2],[163.5,567.3],[150,557.1],[188.9,535.2],[210.8,511.5],[253.1,504.7],[281.9,489.5],[317.4,450.6],[334.3,416.8],[349.5,410],[342.7,421.9],[351.2,428.6],[366.4,413.4],[381.6,408.3],[385,394.8],[391.8,389.7],[381.6,376.2],[385,366.1],[379.9,361],[379.9,340.7],[371.5,332.2],[379.9,268],[373.2,251.1],[373.2,195.3],[361.3,171.6],[363,159.8],[347.8,146.2],[341,120.9],[320.8,93.8],[327.5,98.9],[330.9,87.1],[332.6,95.5],[334.3,85.4],[344.4,88.7],[361.3,73.5],[379.9,78.6],[386.7,61.7]];\n  }\n  anchor() { return [175, 545]; }\n  wArr() {\n    if (this._w) return this._w;\n    const a = this.anchor(), s = this.shore();\n    const ds = s.map(p => Math.hypot(p[0]-a[0], p[1]-a[1]));\n    const dmin = Math.min.apply(null, ds), dmax = Math.max.apply(null, ds);\n    this._w = ds.map(d => 0.05 + 0.9 * Math.pow((d-dmin)/(dmax-dmin), 1.1));\n    return this._w;\n  }\n  minE() { return 4805; }\n  maxE() { return 4900; }\n  e0() { return 4790; }\n  range() { return this.maxE() - this.e0(); } // 110\n\n  xOf(elev) { return Math.max(0, Math.min(1, (elev - this.e0()) / this.range())); }\n\n  ptsAt(elev) {\n    const x = this.xOf(elev), a = this.anchor(), s = this.shore(), w = this.wArr();\n    return s.map((p,i) => {\n      let f = (x - w[i]) / (1 - w[i]);\n      f = Math.max(0, Math.min(1, f));\n      return [a[0] + (p[0]-a[0])*f, a[1] + (p[1]-a[1])*f];\n    });\n  }\n  pathAt(elev) {\n    const p = this.ptsAt(elev);\n    let d = 'M ' + p[0][0].toFixed(1) + ' ' + p[0][1].toFixed(1) + ' ';\n    for (let i = 1; i < p.length; i++) d += 'L ' + p[i][0].toFixed(1) + ' ' + p[i][1].toFixed(1) + ' ';\n    return d + 'Z';\n  }\n\n  // ===== cross-section (side profile from the dam upstream) =====\n  csY(E) { return 18 + (4905 - E) * (232/87); }\n  csTerrain() { return [[0,4905],[70,4905],[95,4830],[200,4826],[380,4825],[560,4830],[740,4845],[870,4870],[950,4905],[1000,4905]]; }\n  csAbovePath() {\n    if (this._csA) return this._csA;\n    const t = this.csTerrain();\n    let d = 'M 0 0 L 1000 0 ';\n    for (let i = t.length - 1; i >= 0; i--) d += 'L ' + t[i][0] + ' ' + this.csY(t[i][1]).toFixed(1) + ' ';\n    this._csA = d + 'Z';\n    return this._csA;\n  }\n  csEarthPath() {\n    if (this._csE) return this._csE;\n    const t = this.csTerrain();\n    let d = 'M ' + t[0][0] + ' ' + this.csY(t[0][1]).toFixed(1) + ' ';\n    for (let i = 1; i < t.length; i++) d += 'L ' + t[i][0] + ' ' + this.csY(t[i][1]).toFixed(1) + ' ';\n    this._csE = d + 'L 1000 290 L 0 290 Z';\n    return this._csE;\n  }\n\n  pct(elev) { return Math.pow(this.xOf(elev), 2.87) * 100; }\n  af(elev) { return this.pct(elev)/100 * 110150; }\n  topPct(elev) { return (1 - this.xOf(elev)) * 100; }\n\n  levelDefs() {\n    return [\n      { key:'full',       name:'Full pool',         sub:'Normal year',                E:4900,    pct:100,  tag:'4,900 ft · 100%',     accent:false },\n      { key:'avg',        name:'Long-term average', sub:'All-seasons',                E:4890,    pct:78,   tag:'4,890 ft · 78%',      accent:false },\n      { key:'oct2021',    name:'Oct 2021',          sub:'Recent autumn low',          E:4856.58, pct:15.5, tag:'4,856.58 ft · 15.5%', accent:false },\n      { key:'proj2026',   name:'Projected 2026',    sub:'Naturally, no drawdown',     E:4859.00, Elo:4855, Ehi:4863, isRange:true, pct:16, tag:'4,855–4,863 ft', accent:false, pctHidden:true, note:'Projected · end of 2026' },\n      { key:'thiswinter', name:'Construction low',  sub:'Drawdown for pipeline work',  E:4839.00, pct:3.2,  tag:'4,839 ft',            accent:true,  pctHidden:true, note:'Drawn down for pipeline work' },\n      { key:'rec1992',    name:'Oct 1992',          sub:'Former record',              E:4835.15, pct:1.7,  tag:'4,835.15 ft · 1.7%',  accent:false },\n      { key:'rec1970',    name:'Oct 1970',          sub:'Lowest on record',           E:4828.68, pct:0.2,  tag:'4,828.68 ft · 0.2%',  accent:false }\n    ];\n  }\n\n  selectLevel(key, E) { this.setState({ selKey: key, elev: E }); }\n  onSlide(e) {\n    const v = +e.target.value;\n    const match = this.levelDefs().find(l => Math.abs(l.E - v) < 0.5);\n    this.setState({ elev: v, selKey: match ? match.key : null });\n  }\n\n  fmt(n) { return Math.round(n).toLocaleString(); }\n\n  renderVals() {\n    const showCap = this.props.showCapacity ?? true;\n    const accentCol = this.props.accentColor ?? '#D2693E';\n    const elev = this.state.elev;\n    const defs = this.levelDefs();\n    const sel = defs.find(l => l.key === this.state.selKey);\n\n    const baseBtn = 'flex:1 1 150px; text-align:left; cursor:pointer; padding:11px 14px; border-radius:11px; font-family:Source Sans 3,sans-serif; transition:all .18s; line-height:1.1;';\n    const levels = defs.map(l => {\n      const on = l.key === this.state.selKey;\n      let style;\n      if (l.accent) {\n        style = baseBtn + (on\n          ? `background:${accentCol}; color:#fff; border:2px solid ${accentCol}; box-shadow:0 6px 16px rgba(210,105,62,.32);`\n          : `background:#FAEDE4; color:#B0552F; border:2px solid #EAC9B6;`);\n      } else {\n        style = baseBtn + (on\n          ? 'background:#1F6FA5; color:#fff; border:2px solid #1F6FA5; box-shadow:0 6px 16px rgba(31,111,165,.28);'\n          : 'background:#F3EEDF; color:#3C4C54; border:2px solid #E6DCC6;');\n      }\n      return { name: l.name, tag: l.tag, btnStyle: style, onClick: () => this.selectLevel(l.key, l.E) };\n    });\n\n    // ruler ticks\n    const ticks = [];\n    for (let e = 4810; e <= 4900; e += 10) {\n      const major = (e % 20 === 0) || e === 4900;\n      ticks.push({\n        label: this.fmt(e),\n        top: this.topPct(e).toFixed(2),\n        fs: major ? '12.5px' : '11px',\n        color: major ? '#5C6C74' : '#A99C7C',\n        len: major ? '12px' : '7px'\n      });\n    }\n    const markers = defs.filter(l => l.key !== 'proj2026').map(l => ({\n      top: this.topPct(l.E).toFixed(2),\n      color: l.accent ? accentCol : '#1F6FA5'\n    }));\n    // projected-2026 range band (4,855–4,863 ft)\n    const cband = {\n      top: this.topPct(4863).toFixed(2),\n      h: (this.topPct(4855) - this.topPct(4863)).toFixed(2),\n      lo: this.fmt(4855), hi: this.fmt(4863), col: '#1F6FA5'\n    };\n\n    // selected readout\n    const selName = sel ? sel.name : 'Custom level';\n    let selPctText, selPctColor;\n    if (!showCap) { selPctText = ''; selPctColor = '#6A7A82'; }\n    else if (sel && sel.pctHidden) { selPctText = sel.note || ''; selPctColor = sel.accent ? accentCol : '#1F6FA5'; }\n    else if (sel && sel.accent) { selPctText = sel.pct + '% of capacity · drawn down for pipeline work'; selPctColor = accentCol; }\n    else if (sel && sel.pct != null) { selPctText = sel.pct + '% of capacity · ' + this.fmt(sel.pct/100*110150) + ' acre-ft'; selPctColor = '#1F6FA5'; }\n    else { selPctText = Math.round(this.pct(elev)) + '% of capacity · ' + this.fmt(this.af(elev)) + ' acre-ft'; selPctColor = '#1F6FA5'; }\n\n    const csWaterYNum = this.csY(elev);\n    const pctNow = (sel && sel.pct != null) ? sel.pct : this.pct(elev);\n    const waterOpacity = (0.34 + 0.66 * Math.pow(Math.max(0, Math.min(1, pctNow/100)), 0.5)).toFixed(2);\n\n    return {\n      fullPath: this.pathAt(4900),\n      activePath: this.pathAt(4900),\n      waterOpacity,\n      csAbovePath: this.csAbovePath(),\n      csEarthPath: this.csEarthPath(),\n      csWaterY: csWaterYNum.toFixed(1),\n      csWaterH: (290 - csWaterYNum).toFixed(1),\n      csFullY: this.csY(4900).toFixed(1),\n      csFullLabelY: (this.csY(4900) - 7).toFixed(1),\n      csLabel: (sel ? (sel.isRange ? this.fmt(sel.Elo) + '–' + this.fmt(sel.Ehi) : this.fmt(sel.E)) : this.fmt(elev)) + ' ft',\n      cband,\n      csBandY: this.csY(4863).toFixed(1),\n      csBandH: (this.csY(4855) - this.csY(4863)).toFixed(1),\n      csBandBotY: this.csY(4855).toFixed(1),\n      csBandLabelY: (this.csY(4863) - 6).toFixed(1),\n      csLabelTopPct: (csWaterYNum / 290 * 100).toFixed(2),\n      levels,\n      ticks,\n      markers,\n      indicatorTop: this.topPct(elev).toFixed(2),\n      sliderVal: elev,\n      onSlide: (e) => this.onSlide(e),\n      minE: this.minE(), maxE: this.maxE(),\n      minLabel: this.fmt(this.minE()) + ' ft',\n      maxLabel: this.fmt(this.maxE()) + ' ft',\n      selName,\n      selElev: sel ? (sel.isRange ? this.fmt(sel.Elo) + '–' + this.fmt(sel.Ehi) : sel.E.toLocaleString()) : this.fmt(elev),\n      selPctText, selPctColor\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Pineview Water Levels.bundle-src"}
